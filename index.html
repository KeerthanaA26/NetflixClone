<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Netflix Clone</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- NAVBAR -->
<div class="navigation flex">
<div class="logo">
<img src="./img/NF.png">
</div>

<div class="navbar flex">
<ul class="flex menu">
<li>Home</li>
<li>TV Shows</li>
<li>Movies</li>
<li>New & Popular</li>
<li>My List</li>
</ul>
</div>
</div>

<!-- BANNER -->
<div class="inner">
<div class="banner">
<h3>Marvel Studios</h3>
<h1>Avengers Endgame</h1>

<div class="banner-button">
<button class="btn">
<span class="fa fa-play"></span> Play
</button>

<button class="btn btn1">
<span class="fa fa-info-circle"></span> More Info
</button>
</div>
</div>

<!-- MOVIE CAROUSEL -->
<div class="carousel">

<h3>New Releases</h3>

<div class="carousel-slider">

<div class="carousel-list">

<div class="carousel-item"><img src="./avengers.jpg"></div>
<div class="carousel-item"><img src="./batman.jpg"></div>
<div class="carousel-item"><img src="./captian-america.jpg"></div>
<div class="carousel-item"><img src="./Deadpool.jpg"></div>
<div class="carousel-item"><img src="./Doctor-Strange.jpg"></div>
<div class="carousel-item"><img src="./Gaudians of the galaxy.jpg"></div>
<div class="carousel-item"><img src="./iron-man.jpg"></div>
<div class="carousel-item"><img src="./Thor-love and-thunder.jpg"></div>
<div class="carousel-item"><img src="./venom.jpg"></div>

</div>
</div>
</div>
</div>
</div>

<!-- BACKGROUND VIDEO -->
<div class="video-container">
<div class="color-overlay"></div>

<video autoplay muted loop playsinline>
<source src="./videoplayback.mp4" type="video/mp4">
</video>

</div>

<script src="script.js"></script>

</body>

</html>
